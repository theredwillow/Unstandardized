<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
    <link href="/style.css" rel="stylesheet" type="text/css" media="all">
    
    <style>
      html, body {
          height: 95vh; /* Ensures html and body elements cover the full viewport height */
          margin: 0;   /* Removes default browser margins, preventing scrollbars */
      }
      
      body {
          background-image: url('/assets/404_background.png'); /* Specifies the path to your image */
          background-position: center;             /* Centers the image within the viewport */
          background-repeat: no-repeat;            /* Prevents the image from repeating */
          background-size: cover;                  /* Scales the image to cover the entire container while maintaining aspect ratio */
      }
      
      #text {
          height: 95vh;
          width: 100vw;
          position: absolute;
          z-index: 20;
          color: white;
          font-weight: bold;
          font-size: 12vh;
          text-align: center;
      }
      
      #shrine {
          position: absolute;
          width: 11vw;
          height: 33vh;
          z-index: 10;
          bottom: 22vh;
          left: 44vw;
          text-align: center;
          font-weight: bold;
          font-size: 6vh;
          padding: 2vh;
      }
      
      #man {
        height: 75vh;
        width: 60vw;
        position: absolute;
        left: 0;
        bottom: 0;
        z-index: 10;
      }
    </style>
    
  </head>
  <body>
    <div id="text">
      This is where <span id="route-title">the page</span> would be...
    </div>
    <div id="shrine">this page</div>
    <img id="man" src="/assets/404_image_1.png" alt="404 meme" />
    
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      // Get the path (e.g., "/secret-page")
      const missingPath = window.location.pathname;
  
      const routeTitle = document.getElementById('route-title');
      if (routeTitle) {
        routeTitle.textContent = missingPath;
      }
      
      const shrine = document.getElementById('shrine');
      if (shrine) {
        shrine.textContent = missingPath;
      }
      
      const man = document.getElementById('man');
      const text = document.getElementById('text');
      setTimeout(() => {
        if (man) {
          man.src = src="/assets/404_image_2.png";
        }
  
        if (text) {
          text.textContent = "IF I HAD ONE!";
        }
      }, 3000);
    });
  </script>
  </body>
</html>
